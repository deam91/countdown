name: countdown
description: "Cinematic streaming top-N ranking app. Labhouse Option B."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # State / DI (manual providers — codegen ecosystem is held back by analyzer pins)
  flutter_riverpod: ^3.3.1

  # Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.12.0

  # AI client (handles streaming + structured outputs natively)
  openai_dart: ^5.0.0

  # HTTP (Unsplash + non-AI traffic)
  dio: ^5.9.2
  dio_smart_retry: ^7.0.1
  pretty_dio_logger: ^1.4.0

  # Local storage (invisible query cache — see IDEA.md §3.6)
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  path_provider: ^2.1.4

  # Images
  cached_network_image: ^3.4.1

  # Maps (for PlaceCard variant)
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

  # Animation
  flutter_animate: ^4.5.2
  confetti: ^0.8.0
  visibility_detector: ^0.4.0+2

  # Share
  screenshot: ^3.0.0
  share_plus: ^13.1.0

  # Voice (stretch)
  speech_to_text: ^7.4.0

  # Connectivity
  connectivity_plus: ^7.1.1

  # Logs (shake-to-open overlay)
  talker_flutter: ^5.1.17

  # Typography & icons
  google_fonts: ^8.1.0
  lucide_icons_flutter: ^3.1.14

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Codegen
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0

  # Test
  mocktail: ^1.0.5
  alchemist: ^0.14.0

  # Lints (stricter than flutter_lints)
  very_good_analysis: ^10.2.0

  # Asset pipeline
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png

# App icon — generated from assets/logo.png via:
#   fvm dart run flutter_launcher_icons
flutter_launcher_icons:
  ios: true
  android: false
  image_path: "assets/logo.png"
  remove_alpha_ios: true
  background_color_ios: "#141218"

# Native splash — generated from assets/logo.png via:
#   fvm dart run flutter_native_splash:create
flutter_native_splash:
  color: "#141218"
  image: "assets/logo.png"
  ios: true
  android: false
  fullscreen: true
  ios_content_mode: center
